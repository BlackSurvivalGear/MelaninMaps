<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="theme-color" content="#000000">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Registration | MelaninMaps™</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="melaninmaps-theme">
    <header>
        <nav class="container">
            <button id="mobile-menu-toggle" class="mobile-only" aria-label="Menu">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>

            <a href="index.html" class="logo">
                <img src="logo-mm.png" alt="MelaninMaps™" class="logo-icon">
                <span>Business Registration</span>
            </a>
            <div class="nav-links">
                <a href="melanin-map.html" class="btn btn-outline btn-small">MelaninMaps</a>
            </div>
        </nav>
    </header>

    <div class="auth-container">
        <!-- Mobile Hero Logo -->
        <div class="hero-section-mobile mobile-only" style="margin-top: -4rem;">
            <img src="logo-mm.png" alt="MelaninMaps™ Logo" class="hero-logo">
        </div>
        <div class="auth-card">
            <h2 class="cinzel-text">Register Your Business</h2>
            <p>Join the MelaninMaps™ network and reach a global audience.</p>

            <form id="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="example@domain.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                    <small id="password-hint">Password must be at least 6 characters long.</small>
                </div>
                <button type="submit" id="auth-submit-btn" class="btn btn-primary btn-full">
                    <span id="btn-text">Create Business Account</span>
                    <div id="btn-loader" class="loader hidden"></div>
                </button>
            </form>

            <div id="error-message" class="error-box hidden"></div>

            <div class="auth-switch">
                <p>Already have an account? <a href="business/login.html">Sign In</a></p>
            </div>

            <div class="back-home">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Script that handles registration mode -->
    <script type="module">
        import { auth } from './js/auth.js';
        // The js/auth.js script already checks for ?mode=register
        // We can force it by ensuring the URL has the parameter if it doesn't
        if (!window.location.search.includes('mode=register')) {
            const separator = window.location.search ? '&' : '?';
            window.history.replaceState(null, '', window.location.pathname + window.location.search + separator + 'mode=register');
        }
    </script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/mobile-menu.js"></script>
</body>
</html>
